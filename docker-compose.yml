# Run on Oracle Cloud Always Free VM (or any host with Docker)
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite+aiosqlite:////data/chat_app.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-production}
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
